name: Build PhantomFrida Win10 x64 System 35791
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential python3 git mingw-w64 curl

      - name: 拉取Frida 17.2.0
        run: |
          git clone --recurse-submodules --depth 1 --branch 17.2.0 https://github.com/frida/frida.git

      - name: 应用 Phantom 隐身补丁
        run: |
          python3 patches.py --frida-version 17.2.0 --extended

      - name: 绕开架构检查
        run: |
          sed -i '/if arch not in ARCHES:/s/^/#/' build.py
          sed -i '/raise ValueError(f"Unknown architecture: {arch}")/s/^/#/' build.py

      - name: 编译 Windows x64 版（进程名system 端口35791）
        run: |
          python3 build.py --version 17.2.0 --name system --port 35791 --arch windows-x64 --skip-clone

      - name: 打包产物
        uses: actions/upload-artifact@v4
        with:
          name: system-35791-win64
          path: frida/build/frida-server.exe
