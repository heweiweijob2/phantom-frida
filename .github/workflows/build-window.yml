name: Build PhantomFrida 17.2.0 Win10 System:35791
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装工具链
        run: |
          sudo apt update
          sudo apt install -y build-essential python3 git mingw-w64
      - name: 拉取Frida 17.2.0源码
        run: git clone --depth 1 --branch 17.2.0 https://github.com/frida/frida.git
      - name: 应用隐身扩展补丁
        run: python3 patches.py --frida-version 17.2.0
      - name: 修改端口为35791+进程名为system
        run: |
          cd frida
          sed -i 's/27042/35791/g' $(find . -name "*.c" -o -name "*.h")
          sed -i 's/frida-server/system/g' $(find . -name "*.c" -o -name "*.h")
      - name: 交叉编译Windows x64
        run: |
          cd frida
          ./configure --host=x86_64-w64-mingw32
          make -j$(nproc)
      - name: 上传魔改exe
        uses: actions/upload-artifact@v4
        with:
          name: phantomfrida-system-35791-win10
          path: frida/build/frida-server.exe
