name: Build PhantomFrida Win10 x64 System 35791 (23rd)
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential python3 git mingw-w64
      - name: Clone Frida 17.2.0
        run: git clone --depth 1 --branch 17.2.0 https://github.com/frida/frida.git
      - name: Apply PhantomFrida patches
        run: python3 patches.py --frida-version 17.2.0 --extended
      - name: Bypass architecture check in build.py
        run: |
          sed -i 's/if arch not in ARCHES:/# if arch not in ARCHES:/' build.py
          sed -i 's/    raise ValueError(f"Unknown architecture: {arch}")/#     raise ValueError(f"Unknown architecture: {arch}")/' build.py
      - name: Force Windows cross-compile
        run: |
          python3 build.py --version 17.2.0 --name system --port 35791 --arch windows-x64 --skip-clone
          cd frida
          ./configure --host=x86_64-w64-mingw32
          make -j$(nproc)
      - name: Rename output to system.exe
        run: mv frida/build/frida-server.exe system.exe
      - name: Upload system.exe
        uses: actions/upload-artifact@v4
        with:
          name: system-35791-win10-x64
          path: system.exe
