name: Build PhantomFrida 17.2.0 Windows x64 魔改版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y build-essential python3 python3-pip git mingw-w64 ninja-build

      - name: Build for Windows x64
        run: |
          cd frida
          git checkout 17.2.0
          python3 tools/ensure-submodules.py
          ./configure --host=x86_64-w64-mingw32
          make -j$(nproc)

      - name: Upload final Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: phantom-frida-17.2.0-windows-x64
          path: |
            frida/build/frida.exe
            frida/build/frida-server.exe
            frida/build/frida-inject.exe
