name: Build PhantomFrida 17.2.0 Windows x64 魔改版

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            python3 \
            python3-pip \
            git \
            ninja-build \
            mingw-w64

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Apply patches (魔改核心)
        run: |
          python3 patches.py --frida-version 17.2.0

      - name: Enter frida source
        run: cd frida

      - name: Configure for Windows x64
        run: |
          cd frida
          ./configure --host=x86_64-w64-mingw32

      - name: Build
        run: |
          cd frida
          make -j$(nproc)

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: phantom-frida-17.2.0-windows-x64-modded
          path: |
            frida/build/frida.exe
            frida/build/frida-server.exe
            frida/build/frida-inject.exe
