name: Build Phantom-Frida Windows-x64 (v30)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 主仓库（修正为master分支，递归拉取子模块）
        uses: actions/checkout@v4
        with:
          repository: TheQmaks/phantom-frida
          ref: master  # 👈 关键：从main改为master
          submodules: recursive
          fetch-depth: 0

      - name: 安装完整编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential python3 python3-pip mingw-w64 git libssl-dev
          python3 -m pip install -U pip setuptools wheel
          pip install -r requirements.txt

      - name: 允许 windows-x64 编译
        run: |
          sed -i 's/allowed_architectures = .*/allowed_architectures = ["windows-x64", "android-arm64", "android-x86_64"]/' build.py

      - name: 开始编译
        run: |
          python3 build.py \
            --version 17.2.0 \
            --arch windows-x64 \
            --name system \
            --port 35791 \
            --extended

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: phantom-frida-windows-x64-v30
          path: output/
