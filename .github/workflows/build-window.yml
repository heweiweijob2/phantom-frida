name: Build Frida 17.2.0 Windows EXE
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-pip mingw-w64 git
          pip3 install frida-tools
          npm install -g prebuildify
      - name: Clone Frida repo and checkout 17.2.0
        run: |
          git clone -b 17.2.0 --depth=1 https://github.com/frida/frida.git
          cd frida
          python3 tools/ensure-submodules.py
          npm install
      - name: Cross-compile to Windows x64
        run: |
          cd frida
          prebuildify --platform win32 --arch x64 --target 14.15.0
      - name: Upload compiled EXE
        uses: actions/upload-artifact@v4
        with:
          name: frida-17.2.0-win32-x64
          path: frida/prebuilds/win32-x64/
